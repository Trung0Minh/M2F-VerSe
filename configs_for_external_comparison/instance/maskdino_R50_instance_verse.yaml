_BASE_: "../coco/instance-segmentation/maskdino_R50_bs16_50ep_3s.yaml"
MODEL:
  WEIGHTS: "../../Mask2Former/weights/coco_instance_R50.pkl"
  SEM_SEG_HEAD:
    NUM_CLASSES: 28 # All 28 vertebrae as separate "Things"
  MaskDINO:
    NUM_OBJECT_QUERIES: 100
DATASETS:
  TRAIN: ("verse_instance_train",)
  TEST: ("verse_instance_val",)
  VERSE_ROOT: "../../dataset_verse_2d/coco"
INPUT:
  MASK_FORMAT: "polygon"
  IMAGE_SIZE: 512
  MIN_SIZE_TRAIN: (512,)
  MAX_SIZE_TRAIN: 512
  MIN_SIZE_TEST: 512
SOLVER:
  IMS_PER_BATCH: 1
  BASE_LR: 0.0001
  MAX_ITER: 20000
  WARMUP_ITERS: 1000
  CHECKPOINT_PERIOD: 5000
  AMP:
    ENABLED: False # Disable AMP for numerical stability
TEST:
  EVAL_PERIOD: 5000
OUTPUT_DIR: "./output/verse_instance_R50"
